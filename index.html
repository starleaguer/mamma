<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오짱이네 레시피 검색 🍱</title>
  <meta name="description" content="재료만 입력하면 아이에게 딱 맞는 유아식 레시피를 바로 찾아드려요." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#ff8a65" />
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="container">
    <!-- Header -->
    <header class="hero">
      <div class="hero-icon">🍚</div>
      <h1>오짱이네 레시피 검색</h1>
      <p class="hero-subtitle">냉장고 속 재료를 입력하면<br />아이에게 딱 맞는 요리를 찾아드려요 ✨</p>
    </header>

    <!-- Search Section -->
    <section class="search-section">
      <div class="search-box">
        <div class="search-input-group">
          <div class="input-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="소고기, 당근, 두부" autocomplete="off" />
            <button id="clearBtn" class="clear-btn" aria-label="지우기">✕</button>
          </div>
        </div>
        <div class="search-actions">
          <button id="viewAllBtn" class="search-btn"
            style="background: rgba(255,255,255,0.07); color: var(--text); border: 1px solid var(--border); box-shadow: none;">전체메뉴보기</button>
          <button id="addRecipeBtn" class="add-btn" title="새 레시피 등록">
            <span class="add-icon">+</span>
            <span class="add-text">레시피 등록</span>
          </button>
        </div>
      </div>

      <!-- Tag Suggestions -->
      <div class="tag-section">
        <div style="display: flex; align-items: center; gap: 0.4rem;">
          <span class="tag-label">자주 쓰는 재료</span>
          <button id="editTagsBtn" class="action-btn" title="재료 수정"
            style="padding: 0.1rem 0.4rem; font-size: 0.7rem;">⚙️</button>
        </div>
        <div class="tags" id="popularTags">
          <!-- Tags will be rendered here dynamically -->
        </div>
      </div>
    </section>

    <!-- Results Section -->
    <section class="results-section" id="resultsSection">
      <div id="resultsHeader" class="results-header hidden">
        <h2 id="resultsTitle"></h2>
        <span id="resultsCount" class="results-count"></span>
      </div>
      <div id="recipeGrid" class="recipe-grid"></div>
      <div id="emptyState" class="empty-state hidden">
        <div class="empty-icon">😢</div>
        <p>해당 재료로 만들 수 있는 유아식을 찾지 못했어요.</p>
        <p class="empty-sub">다른 재료를 입력해 보세요!</p>
      </div>
      <div id="initialState" class="initial-state">
        <div class="initial-icon">👶</div>
        <p>재료를 검색하면<br />맞춤 유아식 메뉴가 나타나요!</p>
      </div>
    </section>
  </div>

  <!-- Recipe Modal -->
  <div id="recipeModal" class="modal-overlay hidden">
    <div class="modal-card">
      <button class="modal-close" id="modalClose">✕</button>
      <div id="modalHero" class="modal-hero hidden">
        <img id="modalImage" src="" alt="요리 사진" />
        <div class="modal-hero-emoji" id="modalEmoji"></div>
      </div>
      <div id="modalNoHero" class="modal-emoji"></div>
      <h2 class="modal-title" id="modalTitle"></h2>
      <div class="modal-badges" id="modalBadges"></div>
      <div class="modal-section">
        <h3>재료</h3>
        <ul class="modal-ingredients" id="modalIngredients"></ul>
      </div>
      <div class="modal-section">
        <div class="modal-section-header">
          <h3>조리 방법</h3>
          <div class="modal-actions">
            <button id="editBtn" class="action-btn">✏️ 수정</button>
            <button id="deleteBtn" class="action-btn delete-btn">🗑️ 삭제</button>
          </div>
        </div>
        <ol class="modal-steps" id="modalSteps"></ol>
      </div>
      <div class="modal-tip" id="modalTip"></div>
    </div>
  </div>

  <!-- Add Recipe Modal -->
  <div id="addRecipeModal" class="modal-overlay hidden">
    <div class="modal-card">
      <button class="modal-close" id="addModalClose">✕</button>
      <h2 class="modal-title" id="formModalTitle">새 레시피 등록 🍳</h2>
      <p class="modal-subtitle" id="formModalSubtitle">나만의 특별한 유아식 메뉴를 추가해보세요.</p>

      <form id="addRecipeForm" class="add-form">
        <div class="form-group row">
          <div class="field">
            <label for="newName">메뉴명 *</label>
            <input type="text" id="newName" placeholder="예: 단호박 퓨레" required />
          </div>
          <div class="field narrow">
            <label for="newEmoji">아이콘</label>
            <input type="text" id="newEmoji" placeholder="🍱" maxlength="2" />
          </div>
        </div>

        <div class="form-group row">
          <div class="field">
            <label for="newDifficulty">난이도</label>
            <select id="newDifficulty">
              <option value="쉬움">쉬움</option>
              <option value="보통" selected>보통</option>
              <option value="어려움">어려움</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="newIngredients">주요 재료 (쉼표로 구분) *</label>
          <input type="text" id="newIngredients" placeholder="예: 단호박, 우유, 꿀" required />
        </div>

        <div class="form-group">
          <label for="newImageUrl">요리 사진 URL (선택)</label>
          <div class="image-input-wrapper">
            <input type="text" id="newImageUrl" placeholder="https://example.com/food.jpg 또는 /img/경로" />
            <div id="imagePreview" class="image-preview hidden">
              <img id="previewImg" src="" alt="미리보기" />
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="newDescription">한 줄 설명</label>
          <input type="text" id="newDescription" placeholder="예: 달콤하고 부드러운 영양 간식" />
        </div>

        <div class="form-group">
          <label for="newSteps">조리 방법 (한 단계씩 줄바꿈으로 입력) *</label>
          <textarea id="newSteps" placeholder="1. 단호박을 쪄서 으깹니다.&#10;2. 우유를 넣고 저어주세요." required></textarea>
        </div>

        <div class="form-group">
          <label for="newTip">꿀팁 한마디</label>
          <input type="text" id="newTip" placeholder="예: 꿀은 돌 이후 아기에게만 넣어주세요." />
        </div>

        <div class="form-footer">
          <button type="button" class="action-btn large" id="addModalCancel">취소</button>
          <button type="submit" class="search-btn" id="formSubmitBtn">저장하기</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Edit Tags Modal -->
  <div id="editTagsModal" class="modal-overlay hidden">
    <div class="modal-card" style="max-width: 440px;">
      <button class="modal-close" id="editTagsClose">✕</button>
      <h2 class="modal-title">자주 쓰는 재료 수정 ⚙️</h2>
      <p class="modal-subtitle">클릭해서 삭제하거나 새 재료를 추가하세요.</p>

      <div class="form-group" style="margin-bottom: 1.5rem;">
        <div class="input-with-button">
          <input type="text" id="newTagInput" placeholder="새 재료 입력 (예: 소고기)" />
          <button type="button" id="addTagBtn" class="inner-btn">추가</button>
        </div>
      </div>

      <div class="tags" id="editTagsList" style="margin-bottom: 2rem;">
        <!-- Editable Tags will be populated here -->
      </div>

      <div class="form-footer">
        <button type="button" class="action-btn large" id="editTagsCancel">취소</button>
        <button type="button" class="search-btn" id="saveTagsBtn">저장하기</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
